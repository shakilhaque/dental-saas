# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name dentalsaas.com *.dentalsaas.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Main App
server {
    listen 443 ssl http2;
    server_name dentalsaas.com www.dentalsaas.com;

    ssl_certificate     /etc/letsencrypt/live/dentalsaas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dentalsaas.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # API routes → backend
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auth routes - stricter limit
    location /api/v1/auth {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://backend:5000;
    }

    # Frontend app
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# Wildcard subdomain → same app (tenant routing via subdomain)
server {
    listen 443 ssl http2;
    server_name *.dentalsaas.com;

    ssl_certificate     /etc/letsencrypt/live/dentalsaas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dentalsaas.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Extract subdomain and pass to app
    set $tenant_subdomain "";
    if ($host ~* "^(.+)\.dentalsaas\.com$") {
        set $tenant_subdomain $1;
    }

    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
    }
}
